<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --text: #f0f0f8;
    --muted: #7878a0;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #43e97b;
    --red: #ff6b6b;
    --yellow: #ffd93d;
    --orange: #ff9a3c;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(80px + var(--safe-bottom));
    overscroll-behavior: none;
  }
  /* Header */
  .header {
    padding: calc(var(--safe-top) + 20px) 20px 20px;
    background: linear-gradient(180deg, #0a0a0f 0%, transparent 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .header-inner { display: flex; justify-content: space-between; align-items: center; }
  .app-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .app-title span { color: var(--accent); }
  .refresh-btn {
    width: 36px; height: 36px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px;
    transition: all 0.2s;
  }
  .refresh-btn:active { transform: scale(0.9); }
  /* Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 0 calc(12px + var(--safe-bottom));
    background: rgba(13,13,20,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    cursor: pointer; padding: 4px;
    transition: all 0.2s;
  }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; color: var(--muted); font-weight: 500; }
  .nav-item.active .nav-label { color: var(--accent); }
  .nav-item.active .nav-icon { filter: drop-shadow(0 0 6px var(--accent)); }
  /* Pages */
  .page { display: none; padding: 0 16px; }
  .page.active { display: block; }
  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 14px;
  }
  .card-label {
    font-size: 11px; font-weight: 600;
    color: var(--muted); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  /* Hero Balance */
  .hero-card {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border: 1px solid #2a4080;
    border-radius: 22px;
    padding: 24px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .hero-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(108,99,255,0.3) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero-label { font-size: 11px; color: #8899cc; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .hero-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px; font-weight: 600;
    color: #fff; letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .hero-sub { font-size: 13px; color: #8899cc; }
  .hero-row { display: flex; gap: 20px; margin-top: 18px; }
  .hero-stat { flex: 1; }
  .hero-stat-label { font-size: 10px; color: #6677aa; text-transform: uppercase; font-weight: 600; margin-bottom: 3px; }
  .hero-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; }
  .income-val { color: var(--green); }
  .expense-val { color: var(--red); }
  /* Month Tabs */
  .month-tabs {
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 2px; margin-bottom: 14px;
    scrollbar-width: none;
  }
  .month-tabs::-webkit-scrollbar { display: none; }
  .month-tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .month-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  /* Stats Row */
  .stats-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
  }
  .stat-icon { font-size: 20px; margin-bottom: 6px; }
  .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .stat-lbl { font-size: 10px; color: var(--muted); font-weight: 500; }
  /* Chart containers */
  .chart-wrap { position: relative; height: 200px; margin-top: 12px; }
  .chart-wrap-sm { position: relative; height: 160px; margin-top: 12px; }
  /* Section header */
  .section-hdr {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .section-title { font-size: 15px; font-weight: 700; }
  .see-all { font-size: 12px; color: var(--accent); font-weight: 600; cursor: pointer; }
  /* Transaction items */
  .txn-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .txn-item:last-child { border-bottom: none; }
  .txn-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .txn-info { flex: 1; min-width: 0; }
  .txn-merchant {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .txn-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .txn-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 600; text-align: right; flex-shrink: 0;
  }
  .txn-date { font-size: 10px; color: var(--muted); text-align: right; margin-top: 2px; }
  /* Category pill */
  .cat-pill {
    display: inline-block;
    font-size: 9px; font-weight: 700;
    padding: 2px 6px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  /* Account chips */
  .account-chip {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .account-icon { font-size: 22px; }
  .account-name { font-size: 13px; font-weight: 600; }
  .account-num { font-size: 11px; color: var(--muted); }
  .account-amt { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; margin-left: auto; }
  /* Loading */
  .loading { text-align: center; padding: 60px 20px; }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Insight cards */
  .insight {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .insight-icon { font-size: 24px; flex-shrink: 0; }
  .insight-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .insight-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  /* Progress bar */
  .progress-bar {
    height: 6px; background: var(--border);
    border-radius: 3px; overflow: hidden; margin-top: 8px;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.8s ease;
  }
  .cat-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .cat-row-icon { font-size: 16px; width: 28px; flex-shrink: 0; }
  .cat-row-info { flex: 1; }
  .cat-row-name { font-size: 13px; font-weight: 500; }
  .cat-row-pct { font-size: 11px; color: var(--muted); }
  .cat-row-amt { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; flex-shrink: 0; }
</style>
</head>

const fmt = n => '₹' + Math.abs(n).toLocaleString('en-IN', {minimumFractionDigits:0,maximumFractionDigits:0});
const fmtFull = n => '₹' + Math.abs(n).toLocaleString('en-IN', {minimumFractionDigits:2,maximumFractionDigits:2});

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function getMonth(d){ const dt=new Date(d); return dt.getMonth(); }
function getYear(d){ const dt=new Date(d); return dt.getFullYear(); }

const isDebit = r => ['Debit','CC Spend','Transfer'].includes(r.type) && !['Credit','Refund'].includes(r.type);
const isCredit = r => ['Credit'].includes(r.type);

const CATEGORY_META = {
  'Food & Dining':   {icon:'🍔',color:'#ff6b6b'},
  'Shopping':        {icon:'🛍️',color:'#6c63ff'},
  'Personal Transfer':{icon:'↔️',color:'#7878a0'},
  'Personal Receipt':{icon:'📥',color:'#43e97b'},
  'Investments':     {icon:'📈',color:'#43e97b'},
  'Insurance':       {icon:'🛡️',color:'#4ecdc4'},
  'Groceries':       {icon:'🥬',color:'#a8e063'},
  'Utilities':       {icon:'💡',color:'#ffd93d'},
  'Liquor':          {icon:'🍺',color:'#ff9a3c'},
  'CC Bill Payment': {icon:'💳',color:'#9c88ff'},
  'Salary':          {icon:'💰',color:'#43e97b'},
  'Quick Commerce':  {icon:'⚡',color:'#ffd93d'},
  'Travel':          {icon:'✈️',color:'#74b9ff'},
  'Tech/Services':   {icon:'💻',color:'#a29bfe'},
  'Bank Charges':    {icon:'🏦',color:'#fd79a8'},
  'Transfer':        {icon:'🔄',color:'#636e72'},
  'Refund':          {icon:'↩️',color:'#00b894'},
  'Uncategorized':   {icon:'❓',color:'#b2bec3'},
};
function catMeta(c){ return CATEGORY_META[c] || {icon:'📌',color:'#636e72'}; }

// Available months
const allMonths = [...new Set(RAW.map(r=>r.date.slice(0,7)))].sort();
let selectedMonth = allMonths[allMonths.length-1]; // default = latest

function filterByMonth(month){ return RAW.filter(r=>r.date.startsWith(month)); }

function calcStats(rows){
  const debits = rows.filter(r=>isDebit(r));
  const credits = rows.filter(r=>isCredit(r));
  const totalOut = debits.reduce((s,r)=>s+r.amt,0);
  const totalIn  = credits.reduce((s,r)=>s+r.amt,0);
  return {debits,credits,totalOut,totalIn,net:totalIn-totalOut,count:rows.length};
}

// Category breakdown (debits only, excluding internal transfers & cc payments)
function catBreakdown(rows){
  const skip = ['Personal Transfer','Personal Receipt','CC Bill Payment','Transfer','Refund','Salary','Investments'];
  const map = {};
  rows.filter(r=>isDebit(r)&&!skip.includes(r.cat)).forEach(r=>{
    map[r.cat]=(map[r.cat]||0)+r.amt;
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}

// Monthly summary across all months
function monthlySummary(){
  return allMonths.map(m=>{
    const rows=filterByMonth(m);
    const s=calcStats(rows);
    return {month:m,in:s.totalIn,out:s.totalOut};
  });
}

function renderAnalytics(){

    <div class="card">

      <div class="chart-wrap-sm"><canvas id="chart-donut"></canvas></div>
    </div>

    <div class="card">
      <div class="card-label">Category Breakdown</div>
      ${breakdown.map(([cat,amt])=>{
        const m=catMeta(cat);
        const pct=total>0?Math.round(amt/total*100):0;
        return `
        <div class="cat-row">
          <div class="cat-row-icon">${m.icon}</div>
          <div class="cat-row-info">
            <div class="cat-row-name">${cat}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${m.color}"></div></div>
          </div>
          <div class="cat-row-amt" style="color:${m.color}">${fmt(amt)}<br><span style="font-size:10px;color:var(--muted)">${pct}%</span></div>
        </div>`;
      }).join('')}
    </div>

    <div class="card">
      <div class="card-label">By Account/Card</div>
      ${renderAccountBreakdown(rows)}
    </div>
  `;

  // Donut
  destroyChart('donut');
  if(breakdown.length>0){
    const ctx2=document.getElementById('chart-donut').getContext('2d');
    charts['donut']=new Chart(ctx2,{
      type:'doughnut',
      data:{
        labels:breakdown.map(c=>c[0]),
        datasets:[{
          data:breakdown.map(c=>c[1]),
          backgroundColor:breakdown.map(c=>catMeta(c[0]).color),
          borderWidth:0,hoverOffset:6
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,cutout:'65%',
        plugins:{
          legend:{position:'right',labels:{color:'#aaa',font:{size:10},boxWidth:10,padding:8}}
        }
      }
    });
  }
}

function renderAccountBreakdown(rows){
  const map={};
  rows.filter(r=>isDebit(r)).forEach(r=>{
    map[r.acc]=(map[r.acc]||0)+r.amt;
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([acc,amt])=>`
    <div class="account-chip">
      <div class="account-icon">🏦</div>
      <div>
        <div class="account-name">${acc}</div>
        <div class="account-num">Debit/Spend</div>
      </div>
      <div class="account-amt expense-val">${fmt(amt)}</div>
    </div>
  `).join('');
}

function renderInsights(){
  const rows = filterByMonth(selectedMonth);
  const s = calcStats(rows);
  const breakdown = catBreakdown(rows);
  const topCat = breakdown[0];
  const allRows_prev = filterByMonth(allMonths[allMonths.indexOf(selectedMonth)-1]||'');
  const prev = calcStats(allRows_prev);

  // Find biggest single transaction
  const bigTxn = [...rows].filter(r=>isDebit(r)).sort((a,b)=>b.amt-a.amt)[0];
  // Savings rate
  const salary = rows.filter(r=>r.cat==='Salary').reduce((s,r)=>s+r.amt,0);
  const savingsRate = salary>0?Math.round((1-(s.totalOut/salary))*100):null;
  // Liquor spend
  const liquorAmt = rows.filter(r=>r.cat==='Liquor').reduce((s,r)=>s+r.amt,0);
  // Investment
  const investAmt = rows.filter(r=>r.cat==='Investments').reduce((s,r)=>s+r.amt,0);

  const insights = [];

  if(topCat) insights.push({
    icon: catMeta(topCat[0]).icon,
    title:`Top spend: ${topCat[0]}`,
    desc:`You spent ${fmt(topCat[1])} on ${topCat[0]} this month — your largest category.`
  });

  if(savingsRate!==null) insights.push({
    icon: savingsRate>=20?'🎯':'⚠️',
    title:`Savings rate: ${savingsRate}%`,
    desc: savingsRate>=20
      ? `Great job! You saved ${savingsRate}% of your salary. Aim for 30%+ for financial freedom.`
      : `Your savings rate is low. Try to save at least 20% of your ₹${fmt(salary)} salary.`
  });

  if(bigTxn) insights.push({
    icon:'💸',
    title:`Biggest expense: ${fmt(bigTxn.amt)}`,

    icon:'🍺',

  if(s.totalOut>s.totalIn && s.totalIn>0) insights.push({
    icon:'🔴',
    title:'Spending more than you earn',
    desc:`This month you spent ${fmt(s.totalOut-s.totalIn)} more than you received. Review your expenses.`

  const mLabel = MONTHS_FULL[parseInt(selectedMonth.slice(5))-1];
  document.getElementById('insights-content').innerHTML = `
    <div style="padding:10px 0 4px;font-size:17px;font-weight:700;">${mLabel} Insights</div>

    <div class="stats-row">
      <div class="stat-card">

      <div class="stat-card">

        <div class="stat-val">${breakdown.length}</div>

    ${insights.map(i=>`
      <div class="insight">
        <div class="insight-icon">${i.icon}</div>
        <div>
          <div class="insight-title">${i.title}</div>
          <div class="insight-desc">${i.desc}</div>
        </div>
      </div>
    `).join('')}

    <div class="card" style="margin-top:4px">
      <div class="card-label">All Accounts</div>
      <div class="account-chip">
        <div class="account-icon">🏦</div>
        <div><div class="account-name">ICICI Bank XX890</div><div class="account-num">Primary Savings</div></div>

      <div class="account-chip">

        <div><div class="account-name">SBI Credit Card XX8706</div><div class="account-num">Credit Card</div></div>

      <div class="account-chip">

        <div><div class="account-name">ICICI Credit Card XX2002</div><div class="account-num">Credit Card</div></div>
      </div>
      <div class="account-chip">

        <div><div class="account-name">Axis Credit Card XX4239</div><div class="account-num">Credit Card</div></div>
      </div>
    </div>
  `;
}

// ============================================================
// SHARED: Transaction Item HTML
// ============================================================
function txnItemHtml(r){
  const m = catMeta(r.cat);
  const isIncoming = r.type==='Credit';
  const amtColor = isIncoming ? 'var(--green)' : 'var(--red)';
  const amtPrefix = isIncoming ? '+' : '-';
  const dt = new Date(r.date);
  const dateStr = dt.getDate()+' '+MONTHS[dt.getMonth()];
  return `
    <div class="txn-item">
      <div class="txn-icon" style="background:${m.color}22">${m.icon}</div>
      <div class="txn-info">
        <div class="txn-merchant">${r.merchant}</div>
        <div class="txn-meta">
          <span class="cat-pill" style="background:${m.color}22;color:${m.color}">${r.cat}</span>
          &nbsp;${r.acc}
        </div>
      </div>
      <div>
        <div class="txn-amount" style="color:${amtColor}">${amtPrefix}${fmt(r.amt)}</div>
        <div class="txn-date">${dateStr}</div>
      </div>
    </div>
  `;
}

// ============================================================
// NAV & MONTH SELECTION
// ============================================================
let currentPage = 'home';
function switchPage(page, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  el.classList.add('active');
  currentPage = page;
  renderPage(page);
  window.scrollTo(0,0);
}

function selectMonth(m){
  selectedMonth=m;
  renderAll();
}

function renderPage(page){
  if(page==='home') renderHome();
  else if(page==='txn') renderTxn();
  else if(page==='analytics') renderAnalytics();
  else if(page==='insights') renderInsights();
}

function renderAll(){
  renderPage(currentPage);
}

// Init
renderHome();
</script>
